name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: cargo-android-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-android-${{ matrix.target }}-

      - name: Build uvc-jni
        run: |
          ANDROID_NDK_HOME=${{ steps.ndk.outputs.ndk-path }} \
          cargo ndk -t ${{ matrix.target }} build --release -p uvc-jni --features android

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uvc-jni-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libuvc_jni.so
          retention-days: 14

      - name: Prepare and Build Android App
        run: |
          if [ "${{ matrix.target }}" == "aarch64-linux-android" ]; then
            mkdir -p android-app/app/src/main/cpp/arm64-v8a
            cp target/aarch64-linux-android/release/libuvc_jni.so android-app/app/src/main/cpp/arm64-v8a/libuvc_jni.so
          fi
          cd android-app
          gradle assembleDebug

  emulator_test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        id: android
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          build-tools-version: 35.0.0
          platforms: android-35
          system-image: system-images;android-35;google_apis;x86_64

      - name: Start Emulator and Smoke Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: medium_phone
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -netfast
          disable-animations: true
          scripts: adb shell getprop ro.product.cpu.abi
