plugins { id 'com.android.application' }

android {
    namespace 'com.test.uvc'
    compileSdk 35
    defaultConfig {
        applicationId 'com.test.uvc'
        minSdk 26
        targetSdk 35
        ndk {
            if (project.hasProperty('targetAbi')) {
                abiFilters project.property('targetAbi')
            }
        }
        externalNativeBuild {
            cmake {
                cppFlags ''
                if (project.hasProperty('targetAbi')) {
                    abiFilters project.property('targetAbi')
                }
            }
        }
    }
    buildTypes { release { minifyEnabled false } }
    externalNativeBuild { cmake { path file('CMakeLists.txt') } }
}

dependencies { implementation 'androidx.core:core-ktx:1.15.0' }
